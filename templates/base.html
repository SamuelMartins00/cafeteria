<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{url_for('static', filename='/style.css')}}">
  <title>Coffee Code{% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <header>
    <div class="navbar navbar-expand-sm bg-muted navbar-muted">
      <div class="container-fluid">
        <a class="navbar-brand" href="/"><img class="img-fluid" style="max-width: 120px;"
            src="{{url_for('static', filename='/logo3.0.png')}}" alt="logo"></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="collapsibleNavbar">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/sobre">Sobre</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/contatos">Contato</a>
            </li>
          </ul>

          <form class="d-flex">
            <input class="form-control me-2 h-99" type="text" placeholder="Pesquisar">
            <button class="btn btn-secondary" type="button">Pesquisar</button>
          </form>
        </div>
      </div>
  </header>

{% block content %} {% endblock %}

  <footer class="bg-dark text-light text-center py-4 mt-5">
    <div class="container">
      <div>
        <p class="mb-0">© 2024 Coffee Code</p>
        <p class="mb-0">Todos os direitos reservados</p>
      </div>
    </div>
  </footer>

</body>

</html>
